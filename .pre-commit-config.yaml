repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      # Lint and auto-fix
      - id: ruff
        args: [--fix]
      # Format
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy
        pass_filenames: false
        args:
          - orchestrator.py
          - hand_state_parser.py
          - tests
          - poker-vision-object-detector
          - poker-vision-decision-engine
          - poker-vision-detection-enricher/detection_enricher.py
          - poker-vision-detection-enricher/ocr_module.py
          - poker-vision-detection-enricher/spatial_reasoning.py
