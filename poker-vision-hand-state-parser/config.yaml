# Port this service listens on.
port: 5003

# Enable verbose logging of full HandState + field diagnostics in /parse.
# Accepted truthy values: true, yes, on, 1
log_diagnostics: true

# When true, JSON logged to the console/file will be pretty-printed (indented).
# Accepted truthy values: true, yes, on, 1
pretty_json_logs: true
